<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OurMart</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f7fa;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 15px 20px;
            text-align: center;
        }

        nav {
            background: #34495e;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #f1c40f;
        }

        .hero {
            text-align: center;
            padding: 50px 20px;
            background: #ecf0f1;
        }

        .hero h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 18px;
            color: #555;
        }

        .products {
            padding: 30px;
            text-align: center;
        }

        .product-card {
            display: inline-block;
            background: white;
            padding: 20px;
            margin: 15px;
            width: 200px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>OurMart 🛒</h1>
    <p>Your Everyday Shopping Partner</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <h1>Welcome to OurMart</h1>
    <p>Best products at the best prices</p>
</section>

<section class="products">
    <h2>Featured Products</h2>

    <div class="product-card">
        <h3>Product 1</h3>
        <p>₹199</p>
    </div>

    <div class="product-card">
        <h3>Product 2</h3>
        <p>₹299</p>
    </div>

    <div class="product-card">
        <h3>Product 3</h3>
        <p>₹399</p>
    </div>

</section>

<footer>
    <p>© 2026 OurMart. All rights reserved.</p>
</footer>

</body>
</html>
